basePath: /
definitions:
  dtos.Campaign:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      masterId:
        type: string
      status:
        $ref: '#/definitions/dtos.CampaignStatus'
      system:
        $ref: '#/definitions/dtos.GameSystem'
      title:
        type: string
      updatedAt:
        type: string
    type: object
  dtos.CampaignSessionTie:
    properties:
      briefDescription:
        type: string
      cachedScheduledAt:
        type: string
      cachedTitle:
        type: string
      campaignId:
        type: string
      orderIndex:
        type: integer
      sessionId:
        type: string
    type: object
  dtos.CampaignStatus:
    enum:
    - active
    - completed
    - cancelled
    - paused
    type: string
    x-enum-varnames:
    - CampaignActive
    - CampaignCompleted
    - CampaignCancelled
    - CampaignPaused
  dtos.Character:
    properties:
      avatarUrl:
        type: string
      class:
        type: string
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      level:
        type: integer
      name:
        type: string
      playerId:
        type: string
      sheetUrl:
        type: string
      updatedAt:
        type: string
    type: object
  dtos.GameSystem:
    properties:
      badgeColor:
        type: string
      id:
        type: string
      isCurated:
        type: boolean
      name:
        type: string
      slug:
        type: string
    type: object
  dtos.Location:
    properties:
      address:
        type: string
      lat:
        type: number
      lng:
        type: number
    type: object
  dtos.NextSession:
    properties:
      format:
        $ref: '#/definitions/dtos.SessionFormat'
      id:
        type: string
      scheduledAt:
        type: string
      system:
        $ref: '#/definitions/dtos.GameSystem'
      type:
        $ref: '#/definitions/dtos.SessionType'
    type: object
  dtos.Session:
    properties:
      availability:
        $ref: '#/definitions/dtos.SessionAvailability'
      createdAt:
        type: string
      description:
        type: string
      duration:
        type: number
      format:
        $ref: '#/definitions/dtos.SessionFormat'
      freeSeats:
        type: integer
      id:
        type: string
      location:
        $ref: '#/definitions/dtos.Location'
      masterId:
        type: string
      masterNotes:
        type: string
      maxSeats:
        type: integer
      previewUrl:
        type: string
      price:
        type: number
      scheduledAt:
        type: string
      status:
        $ref: '#/definitions/dtos.SessionStatus'
      system:
        $ref: '#/definitions/dtos.GameSystem'
      title:
        type: string
      type:
        $ref: '#/definitions/dtos.SessionType'
      updatedAt:
        type: string
    type: object
  dtos.SessionApplication:
    properties:
      applicantId:
        type: string
      createdAt:
        type: string
      id:
        type: string
      message:
        type: string
      resolvedAt:
        type: string
      sessionId:
        type: string
      status:
        $ref: '#/definitions/dtos.SessionApplicationStatus'
    type: object
  dtos.SessionApplicationStatus:
    enum:
    - pending
    - accepted
    - rejected
    - cancelled
    type: string
    x-enum-varnames:
    - ApplicationPending
    - ApplicationAccepted
    - ApplicationRejected
    - ApplicationCancelled
  dtos.SessionAvailability:
    enum:
    - open
    - application
    - private
    type: string
    x-enum-varnames:
    - Open
    - Application
    - Private
  dtos.SessionCardData:
    properties:
      nextSession:
        $ref: '#/definitions/dtos.NextSession'
      systemStats:
        items:
          $ref: '#/definitions/dtos.SystemStat'
        type: array
      userId:
        type: string
    type: object
  dtos.SessionCommentary:
    properties:
      authorId:
        type: string
      createdAt:
        type: string
      id:
        type: string
      sessionId:
        type: string
      text:
        type: string
      updatedAt:
        type: string
    type: object
  dtos.SessionFile:
    properties:
      filename:
        type: string
      id:
        type: string
      mimeType:
        type: string
      sessionId:
        type: string
      sizeBytes:
        type: integer
      uploadedAt:
        type: string
      uploaderId:
        type: string
      url:
        type: string
    type: object
  dtos.SessionFormat:
    enum:
    - online
    - offline
    type: string
    x-enum-varnames:
    - Online
    - Offline
  dtos.SessionListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/dtos.Session'
        type: array
      nextCursor:
        type: string
      users:
        additionalProperties:
          $ref: '#/definitions/dtos.UserBrief'
        type: object
    type: object
  dtos.SessionPlayer:
    properties:
      character:
        $ref: '#/definitions/dtos.Character'
      joinedAt:
        type: string
      playerId:
        type: string
      sessionId:
        type: string
      status:
        $ref: '#/definitions/dtos.SessionPlayerStatus'
    type: object
  dtos.SessionPlayerStatus:
    enum:
    - active
    - kicked
    - left
    type: string
    x-enum-varnames:
    - PlayerActive
    - PlayerKicked
    - PlayerLeft
  dtos.SessionPlayersResponse:
    properties:
      players:
        items:
          $ref: '#/definitions/dtos.SessionPlayer'
        type: array
      users:
        additionalProperties:
          $ref: '#/definitions/dtos.UserBrief'
        type: object
    type: object
  dtos.SessionResponse:
    properties:
      players:
        items:
          $ref: '#/definitions/dtos.SessionPlayer'
        type: array
      session:
        $ref: '#/definitions/dtos.Session'
      users:
        additionalProperties:
          $ref: '#/definitions/dtos.UserBrief'
        type: object
    type: object
  dtos.SessionStatus:
    enum:
    - draft
    - published
    - ongoing
    - completed
    - cancelled
    type: string
    x-enum-varnames:
    - Draft
    - Published
    - Ongoing
    - Completed
    - Cancelled
  dtos.SessionType:
    enum:
    - oneshot
    - campaign
    type: string
    x-enum-varnames:
    - OneshotType
    - CampaignType
  dtos.SystemStat:
    properties:
      badgeColor:
        type: string
      id:
        type: string
      isCurated:
        type: boolean
      name:
        type: string
      sessionsCount:
        type: integer
      slug:
        type: string
    type: object
  dtos.UserBrief:
    properties:
      avatarUrl:
        type: string
      displayName:
        type: string
      hosted:
        type: integer
      id:
        type: string
      played:
        type: integer
      rating:
        type: number
      username:
        type: string
    type: object
  internal_handlers.ChangeCampaignStatusRequest:
    properties:
      status:
        type: string
    type: object
  internal_handlers.ChangeStatusRequest:
    properties:
      status:
        $ref: '#/definitions/dtos.SessionStatus'
    type: object
  internal_handlers.CreateCampaignRequest:
    properties:
      description:
        type: string
      systemId:
        type: string
      title:
        type: string
    type: object
  internal_handlers.CreateCharacterRequest:
    properties:
      avatarUrl:
        type: string
      class:
        type: string
      description:
        type: string
      level:
        type: integer
      name:
        type: string
      sheetUrl:
        type: string
    type: object
  internal_handlers.CreateGameSystemRequest:
    properties:
      name:
        type: string
    type: object
  internal_handlers.CreateSessionRequest:
    properties:
      availability:
        $ref: '#/definitions/dtos.SessionAvailability'
      description:
        type: string
      durationHours:
        type: number
      format:
        $ref: '#/definitions/dtos.SessionFormat'
      location:
        $ref: '#/definitions/dtos.Location'
      masterNotes:
        type: string
      maxSeats:
        type: integer
      price:
        type: number
      scheduledAt:
        type: string
      systemId:
        type: string
      title:
        type: string
    type: object
  internal_handlers.EditCampaignRequest:
    properties:
      description:
        type: string
      systemId:
        type: string
      title:
        type: string
    type: object
  internal_handlers.EditCharacterRequest:
    properties:
      avatarUrl:
        type: string
      class:
        type: string
      description:
        type: string
      level:
        type: integer
      name:
        type: string
      sheetUrl:
        type: string
    type: object
  internal_handlers.EditSessionRequest:
    properties:
      availability:
        $ref: '#/definitions/dtos.SessionAvailability'
      description:
        type: string
      durationHours:
        type: number
      format:
        $ref: '#/definitions/dtos.SessionFormat'
      location:
        $ref: '#/definitions/dtos.Location'
      masterNotes:
        type: string
      maxSeats:
        type: integer
      previewUrl:
        type: string
      price:
        type: number
      scheduledAt:
        type: string
      systemId:
        type: string
      title:
        type: string
    type: object
  internal_handlers.EditTieRequest:
    properties:
      briefDescription:
        type: string
      orderIndex:
        type: integer
    type: object
  internal_handlers.ErrorResponse:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  internal_handlers.TieSessionRequest:
    properties:
      briefDescription:
        type: string
      orderIndex:
        type: integer
      sessionId:
        type: string
    type: object
host: localhost:3001
info:
  contact: {}
  description: Session, game system, campaign and character API for Session Zero
  title: Session Zero Session Service
  version: "1.0"
paths:
  /v1/campaigns:
    get:
      parameters:
      - description: Search query
        in: query
        name: search
        type: string
      - description: Filter by master user ID
        in: query
        name: masterId
        type: string
      - description: Filter by game system ID
        in: query
        name: systemId
        type: string
      - description: Status filter
        enum:
        - active
        - completed
        - cancelled
        - paused
        in: query
        name: status
        type: string
      - description: Sort field
        in: query
        name: sort
        type: string
      - description: Sort order
        enum:
        - ASC
        - DESC
        in: query
        name: order
        type: string
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  $ref: '#/definitions/dtos.Campaign'
                type: array
              nextCursor:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: List campaigns
      tags:
      - campaigns
    post:
      consumes:
      - application/json
      parameters:
      - description: Campaign data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.CreateCampaignRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.Campaign'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Create a campaign
      tags:
      - campaigns
  /v1/campaigns/{id}:
    delete:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Delete a campaign
      tags:
      - campaigns
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.Campaign'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Get campaign by ID
      tags:
      - campaigns
    patch:
      consumes:
      - application/json
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.EditCampaignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.Campaign'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Edit a campaign
      tags:
      - campaigns
  /v1/campaigns/{id}/players:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
